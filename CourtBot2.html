<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title id="pageTitle">CourtBot</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <style>
        :root {
            --main-blue: #4183dd;
            --blue-grad: linear-gradient(90deg, #4183dd 40%, #5ea3e2 100%);
            --blue-grad-hover: linear-gradient(90deg, #356fba 40%, #4889c6 100%);
            --red-grad: linear-gradient(90deg, #ffd0d0 20%, #ffb1b1 100%);
            --box-shadow: 0 6px 32px 0 rgba(55, 89, 124, 0.10);
        }

        html, body {
            background: #f4f7fa;
            min-height: 100vh;
            margin: 0;
            font-family: 'Segoe UI', 'Arial', 'Microsoft JhengHei', sans-serif;
            color: #234059;
        }

        body {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            background: #fff;
            margin: 20px 0;
            padding: 25px 30px;
            border-radius: 18px;
            box-shadow: var(--box-shadow);
            max-width: 700px;
            width: 95%;
        }

        h2 {
            text-align: center;
            margin-top: 0;
            color: #35547a;
            letter-spacing: 2px;
            margin-bottom: 15px;
        }

        /* Accordion 樣式 */
        .accordion {
            background-color: #f1f6fc;
            color: #2c5282;
            cursor: pointer;
            padding: 12px 18px;
            width: 100%;
            border: none;
            text-align: left;
            outline: none;
            font-size: 0.95rem;
            font-weight: 600;
            transition: 0.4s;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 5px;
        }

            .active, .accordion:hover {
                background-color: #e2eefb;
            }

            .accordion:after {
                content: '\002B'; /* 加號 */
                color: #777;
                font-weight: bold;
                margin-left: 5px;
            }

        .active:after {
            content: "\2212"; /* 減號 */
        }

        .panel {
            padding: 0 18px;
            background-color: white;
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.2s ease-out;
            margin-bottom: 20px;
            border-radius: 0 0 8px 8px;
        }

        .instruction-content {
            padding: 15px 0;
            font-size: 0.9rem;
            line-height: 1.6;
            color: #4a6a8a;
            border-top: 1px solid #e2e8f0;
        }

        /* 網格布局：1 row 2 columns */
        .grid-form {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        label {
            font-weight: 600;
            margin-bottom: 6px;
            color: #24406a;
            font-size: 0.95rem;
        }

        textarea, input {
            width: 100%;
            border-radius: 8px;
            border: 1.2px solid #d1dde8;
            background: #f8fbfd;
            padding: 10px;
            font-size: 1rem;
            box-sizing: border-box;
        }

        .note {
            color: #7b96b6;
            font-size: 12px;
            margin-top: 4px;
        }

        /* 按鈕區 */
        .full-width {
            grid-column: span 2;
        }

        .btn-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 10px;
        }

        button.main-btn {
            padding: 14px;
            border-radius: 8px;
            border: none;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            background: var(--blue-grad);
            color: #fff;
            transition: 0.3s;
            white-space: nowrap;
        }

            button.main-btn:hover {
                opacity: 0.9;
            }

        #countdown {
            grid-column: span 2;
            margin-top: 15px;
            font-size: 1.6rem;
            color: #b52222;
            font-family: 'Courier New', Courier, monospace;
            font-weight: bold;
            text-align: center;
            background: #fff0f0;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #ffcccc;
        }

        /* 連結預覽區 */
        #linkList {
            grid-column: span 2;
            padding: 0;
            margin: 20px 0 0 0;
            list-style: none;
        }

            #linkList li {
                background: #f7faff;
                border-radius: 6px;
                margin-bottom: 12px;
                padding: 12px;
                border-left: 4px solid #79a9e4;
                font-size: 0.85rem;
                flex-direction: column;
                display: flex;
            }

        .link-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 5px;
            font-weight: bold;
            color: #2c5282;
        }

        .full-url {
            color: #7b96b6;
            word-break: break-all;
            background: #fff;
            padding: 6px;
            border: 1px solid #e2e8f0;
            border-radius: 4px;
            font-family: Consolas, monospace;
            margin-top: 4px;
        }

        #linkList a {
            color: #4183dd;
            text-decoration: none;
        }

        @media (max-width: 600px) {
            .grid-form {
                grid-template-columns: 1fr;
            }

            .full-width {
                grid-column: span 1;
            }

            #countdown {
                grid-column: span 1;
            }

            button.main-btn {
                font-size: 0.85rem;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <h2 id="mainTitle">CourtBot</h2>

        <button class="accordion">📘 使用說明與搶場秘訣</button>
        <div class="panel">
            <div class="instruction-content">
                <strong>基礎操作：</strong><br>
                1. 設定欲搶場的<strong>時段</strong>(24h制)與<strong>場地編號</strong>。<br>
                2. 務必先點擊一次「<strong>手動搶場</strong>」並在網址列允許「彈出式視窗」。<br>
                3. 設定「提前啟動」秒數。基準點為<strong>隔日凌晨 00:00:00.0</strong>。<br><br>
                <strong>搶場秘訣：</strong><br>
                • <strong>提前啟動：</strong>建議設為 0.5 ~ 1.2 秒以抵銷網路延遲。<br>
                • <strong>登入狀態：</strong>請確保在 23:55 前已於該運動中心官網完成登入。<br>
                • <strong>測試：</strong>先用手動按鈕確認生成的網址能進入該場地預約頁。
            </div>
        </div>

        <form onsubmit="return false;" class="grid-form">
            <div class="form-group">
                <label>時段 (逗號分隔)</label>
                <textarea id="qtime" rows="1">10,11</textarea>
                <div class="note">例如: 18,19</div>
            </div>
            <div class="form-group">
                <label>場地編號 (逗號分隔)</label>
                <textarea id="qpid" rows="1">4,5</textarea>
                <div class="note">輸入 1~6 之編號</div>
            </div>

            <div class="form-group">
                <label>預約日期</label>
                <input id="dval" type="date">
            </div>
            <div class="form-group">
                <label>提前啟動 (秒)</label>
                <input id="preSeconds" type="number" step="0.1" value="1.0">
                <div class="note">明日 00:00:00 為準</div>
            </div>

            <div class="form-group">
                <label>連擊頻率 (次/秒)</label>
                <input id="freqN" type="number" value="3">
            </div>
            <div class="form-group">
                <label>持續執行 (秒)</label>
                <input id="durationN" type="number" value="3">
            </div>

            <div class="full-width btn-row">
                <button id="openLinksBtn" class="main-btn" type="button" style="background: #6c757d;">手動搶場</button>
                <button id="autoBtn" class="main-btn" type="button">啟動排程 (00:00:00)</button>
                <button id="cancelAutoBtn" class="main-btn" type="button" style="display:none; background: var(--red-grad); color: #b11c1c; grid-column: span 2;">取消排程並重整</button>
            </div>

            <div id="countdown" style="display:none;"></div>

            <ul id="linkList"></ul>
        </form>
    </div>

    <script>
        // --- Accordion 邏輯 ---
        var acc = document.getElementsByClassName("accordion");
        for (var i = 0; i < acc.length; i++) {
            acc[i].addEventListener("click", function () {
                this.classList.toggle("active");
                var panel = this.nextElementSibling;
                if (panel.style.maxHeight) {
                    panel.style.maxHeight = null;
                } else {
                    panel.style.maxHeight = panel.scrollHeight + "px";
                }
            });
        }

        // --- 核心邏輯 ---
        const venueMap = { '10': '永和', '12': '內湖', '20': '文山' };
        const venueId = new URLSearchParams(window.location.search).get('t') || '10';
        const venueQPidMap = {
            '10': { '1': '1133', '2': '1134', '3': '1135', '4': '1136', '5': '1137', '6': '1138' },
            '12': { '1': '83', '2': '84', '3': '1074', '4': '1075', '5': '87', '6': '88' },
            '20': { '1': '83', '2': '84', '3': '1074', '4': '1075' }
        };
        const QPidMap = venueQPidMap[venueId] || {};
        document.getElementById('mainTitle').textContent = `CourtBot - ${venueMap[venueId] || '中心'}`;

        function getTriggerTime(preSec) {
            const now = new Date();
            const target = new Date(now.getFullYear(), now.getMonth(), now.getDate() + 1, 0, 0, 0, 0);
            return new Date(target.getTime() - (preSec * 1000));
        }

        function updateUI() {
            const qtimeRaw = document.getElementById('qtime').value;
            const qpidRaw = document.getElementById('qpid').value;
            const dateRaw = document.getElementById('dval').value;
            const preSec = parseFloat(document.getElementById('preSeconds').value) || 0;

            const trigger = getTriggerTime(preSec);
            const hh = trigger.getHours().toString().padStart(2, '0');
            const mm = trigger.getMinutes().toString().padStart(2, '0');
            const ss = trigger.getSeconds().toString().padStart(2, '0');
            const ms = Math.floor(trigger.getMilliseconds() / 100);
            document.getElementById('autoBtn').textContent = `啟動排程 (${hh}:${mm}:${ss}.${ms})`;

            const qtimes = qtimeRaw.split(',').map(s => s.trim()).filter(s => s);
            const qpids = qpidRaw.split(',').map(s => s.trim()).filter(s => s);
            const formattedDate = dateRaw.replace(/-/g, '/');
            const links = [];
            const listUI = document.getElementById('linkList');
            listUI.innerHTML = '';

            qpids.forEach(p => {
                qtimes.forEach(t => {
                    const realPid = QPidMap[p] || p;
                    const url = `https://scr.cyc.org.tw/tp${venueId}.aspx?module=net_booking&files=booking_place&StepFlag=25&QPid=${realPid}&QTime=${t}&PT=1&D=${formattedDate}`;
                    links.push(url);
                    const li = document.createElement('li');
                    li.innerHTML = `
                            <div class="link-header">
                                <span>時段 ${t}:00 - 場地 ${p}</span>
                                <a href="${url}" target="_blank">預覽測試 ↗</a>
                            </div>
                            <div class="full-url">${url}</div>
                        `;
                    listUI.appendChild(li);
                });
            });
            return links;
        }

        let autoInterval = null;
        let countdownInterval = null;

        function startScheduling() {
            const preSec = parseFloat(document.getElementById('preSeconds').value) || 1;
            const freq = parseInt(document.getElementById('freqN').value) || 3;
            const duration = parseInt(document.getElementById('durationN').value) || 3;

            document.getElementById('openLinksBtn').style.display = 'none';
            document.getElementById('autoBtn').style.display = 'none';
            document.getElementById('cancelAutoBtn').style.display = 'block';
            document.getElementById('countdown').style.display = 'block';

            const triggerTimestamp = getTriggerTime(preSec).getTime();

            countdownInterval = setInterval(() => {
                const now = Date.now();
                const diff = triggerTimestamp - now;
                if (diff <= 0) {
                    clearInterval(countdownInterval);
                    runBurst(freq, duration);
                } else {
                    const hrs = Math.floor(diff / 3600000);
                    const mins = Math.floor((diff % 3600000) / 60000);
                    const secs = Math.floor((diff % 60000) / 1000);
                    const ms = Math.floor((diff % 1000) / 10);
                    const f = (n) => n.toString().padStart(2, '0');
                    document.getElementById('countdown').textContent = `${f(hrs)}:${f(mins)}:${f(secs)}.${f(ms)}`;
                }
            }, 40);
        }

        function runBurst(freq, duration) {
            const intervalMs = 1000 / freq;
            const totalActions = freq * duration;
            let count = 0;
            document.getElementById('countdown').textContent = "🚀 搶場執行中...";
            document.getElementById('countdown').style.background = "#e6fffa";

            autoInterval = setInterval(() => {
                updateUI().forEach(url => window.open(url, '_blank'));
                count++;
                if (count >= totalActions) {
                    clearInterval(autoInterval);
                    document.getElementById('countdown').textContent = "🏁 執行完畢";
                }
            }, intervalMs);
        }

        ['qtime', 'qpid', 'dval', 'preSeconds'].forEach(id => {
            document.getElementById(id).addEventListener('input', updateUI);
        });
        document.getElementById('openLinksBtn').onclick = () => updateUI().forEach(url => window.open(url, '_blank'));
        document.getElementById('autoBtn').onclick = startScheduling;
        document.getElementById('cancelAutoBtn').onclick = () => location.reload();

        const d = new Date(); d.setDate(d.getDate() + 14);
        document.getElementById('dval').value = d.toISOString().split('T')[0];
        updateUI();
    </script>
</body>
</html>
